{
  "name": "software-quality-pack",
  "version": "0.1.0",
  "type": "skill-pack",
  "summary": "Software quality pack for Claude Code-style workflows.",
  "recommended_order": [
    "quality-attribute-model-builder",
    "quality-weighting-reviewer",
    "quality-goal-scorer",
    "technical-debt-auditor",
    "maintainability-reviewer",
    "usability-quality-reviewer",
    "reliability-quality-reviewer",
    "process-quality-checker",
    "product-vs-process-quality-splitter",
    "quality-evidence-summarizer",
    "quality-risk-register-builder"
  ],
  "skills": [
    {
      "id": "quality-attribute-model-builder",
      "path": "skills/quality-attribute-model-builder/SKILL.md",
      "purpose": "Define a project-specific software quality model with explicit attributes, subattributes, rationale, and evaluation intent.",
      "handoffs": [
        "quality-weighting-reviewer",
        "quality-goal-scorer",
        "quality-risk-register-builder"
      ]
    },
    {
      "id": "quality-weighting-reviewer",
      "path": "skills/quality-weighting-reviewer/SKILL.md",
      "purpose": "Assign and critique relative weights across quality attributes so tradeoffs are explicit rather than accidental.",
      "handoffs": [
        "quality-attribute-model-builder",
        "quality-goal-scorer",
        "quality-risk-register-builder"
      ]
    },
    {
      "id": "quality-goal-scorer",
      "path": "skills/quality-goal-scorer/SKILL.md",
      "purpose": "Score current or proposed system quality goals against evidence, constraints, and stakeholder priorities.",
      "handoffs": [
        "quality-evidence-summarizer",
        "quality-risk-register-builder",
        "technical-debt-auditor"
      ]
    },
    {
      "id": "technical-debt-auditor",
      "path": "skills/technical-debt-auditor/SKILL.md",
      "purpose": "Identify and classify technical debt across code, architecture, tests, documentation, and process, then recommend repayment priorities.",
      "handoffs": [
        "maintainability-reviewer",
        "quality-risk-register-builder",
        "quality-evidence-summarizer"
      ]
    },
    {
      "id": "maintainability-reviewer",
      "path": "skills/maintainability-reviewer/SKILL.md",
      "purpose": "Review a system for maintainability risks such as coupling, complexity, weak tests, poor structure, and difficult change paths.",
      "handoffs": [
        "technical-debt-auditor",
        "quality-risk-register-builder",
        "quality-evidence-summarizer"
      ]
    },
    {
      "id": "usability-quality-reviewer",
      "path": "skills/usability-quality-reviewer/SKILL.md",
      "purpose": "Review usability as a software quality concern using observable task quality, clarity, consistency, feedback, and accessibility cues.",
      "handoffs": [
        "quality-evidence-summarizer",
        "quality-risk-register-builder",
        "quality-goal-scorer"
      ]
    },
    {
      "id": "reliability-quality-reviewer",
      "path": "skills/reliability-quality-reviewer/SKILL.md",
      "purpose": "Review reliability risks and evidence around failure frequency, fault tolerance, recovery behavior, and operational stability.",
      "handoffs": [
        "quality-risk-register-builder",
        "quality-evidence-summarizer",
        "quality-goal-scorer"
      ]
    },
    {
      "id": "process-quality-checker",
      "path": "skills/process-quality-checker/SKILL.md",
      "purpose": "Assess whether the development process supports quality through reviews, testing, traceability, versioning, and release discipline.",
      "handoffs": [
        "product-vs-process-quality-splitter",
        "quality-risk-register-builder",
        "quality-evidence-summarizer"
      ]
    },
    {
      "id": "product-vs-process-quality-splitter",
      "path": "skills/product-vs-process-quality-splitter/SKILL.md",
      "purpose": "Separate product quality concerns from process quality concerns so remediation targets the right layer.",
      "handoffs": [
        "process-quality-checker",
        "quality-risk-register-builder",
        "quality-goal-scorer"
      ]
    },
    {
      "id": "quality-evidence-summarizer",
      "path": "skills/quality-evidence-summarizer/SKILL.md",
      "purpose": "Summarize the available evidence for quality claims, highlight gaps, and make confidence and residual risk explicit.",
      "handoffs": [
        "quality-goal-scorer",
        "quality-risk-register-builder",
        "quality-weighting-reviewer"
      ]
    },
    {
      "id": "quality-risk-register-builder",
      "path": "skills/quality-risk-register-builder/SKILL.md",
      "purpose": "Create a quality-focused risk register linking weak attributes, evidence gaps, consequences, mitigations, and owners.",
      "handoffs": [
        "quality-evidence-summarizer",
        "technical-debt-auditor",
        "process-quality-checker"
      ]
    }
  ],
  "templates": [
    "templates/quality-attribute-model-template.md",
    "templates/quality-weighting-matrix-template.csv",
    "templates/quality-goal-scorecard-template.csv",
    "templates/technical-debt-register-template.csv",
    "templates/maintainability-review-template.md",
    "templates/usability-quality-template.md",
    "templates/reliability-review-template.md",
    "templates/process-quality-checklist-template.md",
    "templates/quality-evidence-summary-template.md",
    "templates/quality-risk-register-template.csv"
  ]
}